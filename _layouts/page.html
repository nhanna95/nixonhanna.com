<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <!-- Favicon for browsers and Google Search -->
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <link rel="icon" href="/monogram.png" type="image/png" />
    <link rel="apple-touch-icon" href="/monogram.png" />

    <title>{% if page.title %}{{ page.title }} — {% endif %}Nixon Hanna</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fraunces:opsz,wght@14..144,600&family=Noto+Serif:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ site.baseurl }}/styles.css" />
    {% include theme-head-fouc.html %}
</head>

<body>
    <aside class="sidebar">
        <img src="{{ site.baseurl }}/headshop.jpeg" alt="Headshot" class="sidebar-headshot">
        <a class="brand" href="{{ '/' | relative_url }}">Nixon Hanna</a>
        <p class="tagline">Safety, writings, and side quests</p>

        <nav class="nav" id="site-nav">
            <a href="{{ '/' | relative_url }}" {% if page.url=='/' %}class="is-active" {% endif %}>Hello</a>
            <a href="{{ '/about.html' | relative_url }}" {% if page.url=='/about.html' %}class="is-active" {% endif
                %}>About</a>
            <a href="{{ '/blog.html' | relative_url }}" {% if page.url=='/blog.html' %}class="is-active" {% endif
                %}>Blog</a>
            <a href="{{ '/contact.html' | relative_url }}" {% if page.url=='/contact.html' %}class="is-active" {% endif
                %}>Contact me</a>
            <div class="menu-profile-links" aria-label="Profiles">
                <a href="https://www.linkedin.com/in/nixon-hanna" target="_blank" rel="noopener noreferrer" title="LinkedIn">LinkedIn</a>
                <a href="https://github.com/nhanna95" target="_blank" rel="noopener noreferrer" title="GitHub">GitHub</a>
            </div>
        </nav>

        {% include theme-toggle-markup.html %}
    </aside>

    <main class="content">
        <h1 class="h1">{{ page.title }}</h1>

        {{ content }}

        {% if page.show_hr != false %}
        <hr class="rule">
        {% endif %}
    </main>

    {% include theme-ui-script.html %}
</body>

</html>
