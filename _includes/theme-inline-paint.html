    <style>
        /* Sync with :root / [data-theme="dark"] in styles.css */
        html[data-theme="dark"] {
            background-color: #1a1a1a;
            color: #e5e5e5;
        }

        html[data-theme="light"] {
            background-color: #ffffff;
            color: #111;
        }

        /* Headshot: same as .sidebar-headshot / mobile .content-headshot but in-document before styles.css to avoid a frame of unstyled image */
        html[data-theme="dark"] .sidebar-headshot {
            background-color: #1f1f1f;
            border-radius: 2rem;
            object-fit: cover;
            aspect-ratio: 675 / 900;
            box-shadow: 0 2px 8px rgba(60, 60, 70, 0.07);
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        html[data-theme="light"] .sidebar-headshot {
            background-color: #FAFAF9;
            border-radius: 2rem;
            object-fit: cover;
            aspect-ratio: 675 / 900;
            box-shadow: 0 2px 8px rgba(60, 60, 70, 0.07);
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        @media (max-width: 720px) {
            html[data-theme="dark"] .content-headshot {
                background-color: #1a1a1a;
            }

            html[data-theme="light"] .content-headshot {
                background-color: #ffffff;
            }

            .content-headshot {
                border-radius: 2rem;
                object-fit: cover;
                aspect-ratio: 675 / 900;
                box-shadow: 0 2px 8px rgba(60, 60, 70, 0.07);
                transform: translateZ(0);
                backface-visibility: hidden;
            }
        }
    </style>
