<!-- No view-transition meta: default Turbo nav used root snapshots and caused font/headshot glitches. Theme toggle still uses startViewTransition in theme-ui.js. -->
<meta name="turbo-cache-control" content="no-preview">
<script>
(function () {
    var urls = [
        {{ '/' | relative_url | jsonify }},
        {{ '/about.html' | relative_url | jsonify }},
        {{ '/blog.html' | relative_url | jsonify }},
        {{ '/contact.html' | relative_url | jsonify }}
    ];
    function addPrefetch() {
        urls.forEach(function (href) {
            var link = document.createElement('link');
            link.rel = 'prefetch';
            link.href = href;
            link.as = 'document';
            document.head.appendChild(link);
        });
    }
    if (document.readyState === 'complete') {
        addPrefetch();
    } else {
        window.addEventListener('load', addPrefetch, { once: true });
    }
})();
</script>
