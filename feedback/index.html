<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="utf-8" />
  <title>Redirecting…</title>
  <meta http-equiv="refresh" content="1; url=https://www.admonymous.co/nixon" />
  <link rel="canonical" href="https://www.admonymous.co/nixon" />
  <link rel="stylesheet" href="{{ '/styles.css' | relative_url }}?v={% include build-asset-v.html %}" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto,
        "Helvetica Neue", Arial, sans-serif;
    }

    .redirect-card {
      padding: 24px 32px;
      border-radius: 12px;
      background: #fafaf9;
      border: 1px solid var(--rule);
      text-align: center;
      max-width: 420px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }

    .redirect-card h1 {
      margin: 0 0 0.5rem;
      font-size: 1.5rem;
    }

    .redirect-card p {
      margin: 0.25rem 0;
    }
  </style>
</head>

<body>
  {% include skip-link.html %}
  <main id="main-content" class="redirect-card" tabindex="-1" aria-label="Anonymous feedback redirect">
    <h1>Redirecting to Admonymous…</h1>
    <p>You’ll be taken to my anonymous feedback page in a moment.</p>
    <p>
      If you are not redirected,
      <a href="https://www.admonymous.co/nixon">
        click here to leave feedback
      </a>.
    </p>
  </main>
  <script>
    (function () {
      var skip = document.querySelector('.skip-link');
      var mainEl = document.getElementById('main-content');
      if (!skip || !mainEl) return;
      skip.addEventListener('click', function () {
        requestAnimationFrame(function () {
          mainEl.focus();
        });
      });
    })();
  </script>
</body>

</html>
