name: Jekyll site CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
      - uses: actions/configure-pages@v4
      - name: Bundle install
        run: bundle install
      - name: Build with Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production
          LANG: en_US.UTF-8
          LC_ALL: en_US.UTF-8
      - name: Verify build output
        run: |
          test -f _site/index.html || { echo "ERROR: _site/index.html missing"; exit 1; }
          test -f _site/styles.css || { echo "ERROR: _site/styles.css missing"; exit 1; }
          test -f _site/theme-ui.js || { echo "ERROR: _site/theme-ui.js missing"; exit 1; }
          if grep -q '{{ content }}' _site/index.html; then
            echo "ERROR: index.html still contains unprocessed Liquid"
            exit 1
          fi
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

